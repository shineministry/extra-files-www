<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shine Ministry Backend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0f2c, #1a237e);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 700px;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1em;
      line-height: 1.6;
      opacity: 0.9;
    }
    .tag {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
    a {
      color: #90caf9;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shine Ministry</h1>
    <p>
      This domain serves as the <strong>backend and infrastructure layer</strong>  
      for all subdomains of <strong>shine-ministry.com</strong>.
    </p>
    <p>
      Public content is available via designated subdomains such as:
      <br><br>
      <a href="https://www.shine-ministry.com">www.shine-ministry.com</a>
    </p>
    <div class="tag">
      System Status: Operational • Managed via GitHub Pages
    </div>
  </div>
</body>
</html>
